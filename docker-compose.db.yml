version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crackgraphai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crackgraphai
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crackgraphai-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crackgraphai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crackgraphai.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - crackgraphai-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  crackgraphai-network:
    driver: bridge
